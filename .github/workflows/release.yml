name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Generate Icons
        run: npm run tauri icon app-icon.jpg

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AnomTracker ${{ github.ref_name }} (Beta)'
          releaseBody: 'This is a beta version. Download the portable executable below to run the app without installation.'
          releaseDraft: false
          prerelease: true

      - name: Upload Portable Executable (Windows)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Rename-Item -Path "src-tauri/target/release/anomtracker.exe" -NewName "EVE AnomTracker-Portable.exe"
          gh release upload ${{ github.ref_name }} "src-tauri/target/release/EVE AnomTracker-Portable.exe" --clobber
